name: dartmini_ide
description: DartMini IDE - A purely mobile-first Dart editor with real execution.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core / UI
  flutter_code_editor: ^0.3.5
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0
  flutter_markdown: ^0.7.4
  fluttertoast: ^8.2.8

  # State Management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Local Storage / Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.0

  # Network & Execution
  http: ^1.2.2

  # File Operations & Utils
  path_provider: ^2.1.4
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  file_picker: ^8.1.2
  dart_style: ^3.1.7
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
