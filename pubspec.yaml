name: dartmini_ide
description: "A mobile-first Dart IDE."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # App State & DB
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.0
  uuid: ^4.5.0

  # Editor
  flutter_code_editor: ^0.3.3
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0
  dart_style: ^2.3.6

  # Networking & Output
  http: ^1.2.2
  url_launcher: ^6.3.0

  # File Operations
  path_provider: ^2.1.4
  file_picker: ^8.1.2
  share_plus: ^10.0.0

  # UI Helpers
  fluttertoast: ^8.2.8
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
