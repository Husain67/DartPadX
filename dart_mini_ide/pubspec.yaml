name: dart_mini_ide
description: A complete, production-ready, purely mobile-first Flutter app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & State
  flutter_riverpod: ^2.5.1
  fluttertoast: ^8.2.8

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.4
  file_picker: ^8.1.2

  # Editor
  flutter_code_editor: ^0.2.0
  highlight: ^0.7.0

  # Networking & Sharing
  http: ^1.2.2
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  flutter_markdown: ^0.7.4
  uuid: ^4.5.3
  flutter_highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
