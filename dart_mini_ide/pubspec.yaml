name: dart_mini_ide
description: "A complete, production-ready, purely mobile-first Flutter app called DartMini IDE (beta)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0 # Updated to match Dart 3.5+ requirement

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Core
  flutter_riverpod: ^2.5.1
  riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.0

  # Network & Utilities
  http: ^1.2.2
  path_provider: ^2.1.4
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  file_picker: ^8.1.2
  uuid: ^4.0.0
  intl: ^0.19.0

  # UI & Editor
  flutter_code_editor: ^0.2.0
  highlight: ^0.7.0
  fluttertoast: ^8.2.8
  flutter_markdown: ^0.7.4
  google_fonts: ^6.2.1
  dart_style: ^2.3.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
