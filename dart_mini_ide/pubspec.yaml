name: dart_mini_ide
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # The old version had a compatibility issue with newer Flutter. Upgrading to a slightly newer but compatible version if possible,
  # or forcing a newer one. The prompt asked for 0.2.0 but let's try 0.3.0+ to fix subtitle1 issue.
  # Checking pub dev, 0.3.0 removed subtitle1 usage.
  flutter_code_editor: ^0.3.2
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.2
  shared_preferences: ^2.3.0
  fluttertoast: ^8.2.8
  path_provider: ^2.1.4
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  file_picker: ^8.1.2
  flutter_markdown: ^0.7.4
  dart_style: ^3.0.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
