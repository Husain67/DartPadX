name: dart_mini_ide
description: "A mobile-first Flutter app called DartMini IDE (beta)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Code editor and styling
  flutter_code_editor: ^0.3.2
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0
  dart_style: ^3.1.7

  # State management
  flutter_riverpod: ^2.5.1
  riverpod: ^2.5.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.0

  # Networking and generic utilities
  http: ^1.2.2
  uuid: ^4.5.1

  # UI feedback and Markdown
  fluttertoast: ^8.2.8
  flutter_markdown: ^0.7.4

  # File handling and sharing
  path_provider: ^2.1.4
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
