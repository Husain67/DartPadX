name: dart_mini_ide
description: A complete, production-ready, purely mobile-first Flutter app IDE.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.4

  # Networking
  http: ^1.2.2
  url_launcher: ^6.3.0

  # UI/UX components
  flutter_code_editor: ^0.2.0
  highlight: ^0.7.0
  fluttertoast: ^8.2.8
  flutter_markdown: ^0.7.4

  # File handling
  share_plus: ^10.0.0
  file_picker: ^8.1.2
  google_fonts: ^8.0.2
  uuid: ^4.5.3
  flutter_highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
