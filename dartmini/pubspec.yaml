name: dartmini
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.4

  # Code Editor
  flutter_code_editor: ^0.3.5
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0

  # Networking & Execution
  http: ^1.2.2

  # Utilities
  fluttertoast: ^8.2.8
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  file_picker: ^8.1.2
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
