name: todoistx_local
description: A feature-rich, offline-first Todo app built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  flutter_riverpod: ^2.3.6
  go_router: ^10.0.0
  intl: ^0.18.1
  freezed_annotation: ^2.4.1

  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0

  # Features
  flutter_local_notifications: ^15.1.0+1
  timezone: ^0.9.2
  speech_to_text: ^6.3.0
  image_picker: ^1.0.2
  flutter_image_compress: ^2.0.3

  # UI
  cupertino_icons: ^1.0.2
  flutter_colorpicker: ^1.0.3
  table_calendar: ^3.0.9
  fl_chart: ^0.63.0

  # Utils
  uuid: ^4.0.0
  collection: ^1.17.2
  path_provider: ^2.0.15
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  hive_generator: ^2.0.0
  build_runner: ^2.4.6
  freezed: ^2.4.1
  mockito: ^5.4.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/